<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Clone | Trending Japan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <aside class="nav-bar">
            <div class="logo">𝕏</div>
            <div class="nav-item active" onclick="location.reload()">🏠 ホーム</div>
            <div class="nav-item" onclick="document.getElementById('searchInput').focus()">🔍 検索</div>
            <div class="nav-item">🔔 通知</div>
            <div class="nav-item">✉️ メッセージ</div>
            <div class="nav-item">👤 プロフィール</div>
        </nav>

        <main class="feed">
            <div class="top-nav">
                <h2 id="pageTitle">日本のトレンド（いいね順）</h2>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="キーワードで検索...">
                    <button onclick="performSearch()">検索</button>
                </div>
            </div>
            <div id="tweetContainer">
                </div>
        </main>

        <aside class="side-panel">
            <div class="trending-card">
                <h3>おすすめのキーワード</h3>
                <div class="trend-tag" onclick="quickSearch('ポケポケ')">#ポケポケ</div>
                <div class="trend-tag" onclick="quickSearch('スプラトゥーン3')">#スプラ3</div>
                <div class="trend-tag" onclick="quickSearch('モンハンワイルズ')">#モンハン</div>
                <div class="trend-tag" onclick="quickSearch('プログラミング')">#エンジニア</div>
            </div>
        </aside>
    </div>
    <script src="main.js"></script>
</body>
</html>
